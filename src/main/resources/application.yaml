spring:
  application:
    name: pochta-simulator

  datasource:
    url: jdbc:postgresql://localhost:5433/pochta_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

logging:
  level:
    com.pochta: DEBUG
    org.springframework.web: INFO