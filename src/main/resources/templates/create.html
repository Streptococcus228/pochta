<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать посылку — Почта</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f7f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        h1 {
            color: #0066cc;
            text-align: center;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.15);
        }

        .price-box {
            background: #e3f2fd;
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #0066cc;
        }

        /* Основная кнопка (Рассчитать и оплатить) */
        .btn-primary {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #0066cc, #0088ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 102, 204, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.4);
            background: linear-gradient(135deg, #0055aa, #0077ee);
        }

        /* Кнопка оплаты внутри формы */
        .btn-pay {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #28a745, #34c759);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        .btn-pay:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
        }

        /* Кнопка Отмена */
        .btn-secondary {
            width: 100%;
            padding: 14px 30px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }

        .payment-form {
            display: none;
            margin-top: 30px;
            padding: 30px;
            border: 2px solid #0066cc;
            border-radius: 16px;
            background: #f8f9fa;
        }
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚚 Создать новую посылку</h1>

    <form id="parcelForm">
        <label>Откуда:</label>
        <select id="fromBranch">
            <option value="Одесса-Центр">Одесса-Центр</option>
            <option value="Киев-Главпочтамт">Киев-Главпочтамт</option>
            <option value="Львов-1">Львов-1</option>
            <option value="Харьков-Север">Харьков-Север</option>
            <option value="Днепр-Юг">Днепр-Юг</option>
        </select>

        <label>Куда:</label>
        <select id="toBranch">
            <option value="Киев-Главпочтамт">Киев-Главпочтамт</option>
            <option value="Одесса-Центр">Одесса-Центр</option>
            <option value="Львов-1">Львов-1</option>
            <option value="Харьков-Север">Харьков-Север</option>
            <option value="Днепр-Юг">Днепр-Юг</option>
        </select>

        <label>Вес посылки (кг):</label>
        <input type="number" id="weight" step="0.1" min="0.1" value="2.5">

        <div class="price-box">
            Стоимость доставки: <span id="priceDisplay">0.00</span> грн
        </div>

        <button type="button" onclick="showPaymentForm()" class="btn-primary">
            Рассчитать стоимость и оплатить
        </button>
    </form>

    <!-- Форма оплаты -->
    <div class="payment-form" id="paymentForm">
        <h2>💳 Оплата доставки</h2>
        <p>К оплате: <strong id="finalPrice">0.00</strong> грн</p>

        <label>Номер карты (16 цифр)</label>
        <input type="text" id="cardNumber" placeholder="4242424242424242" maxlength="16">
        <div id="cardError" class="error"></div>

        <label>Срок действия (MM/YY)</label>
        <input type="text" id="expiry" placeholder="12/28" maxlength="5" oninput="formatExpiry(this)">
        <div id="expiryError" class="error"></div>

        <label>CVV (3 цифры)</label>
        <input type="text" id="cvv" placeholder="123" maxlength="3">
        <div id="cvvError" class="error"></div>

        <button onclick="processPayment()" class="btn-pay">Оплатить и отправить посылку</button>
        <button onclick="hidePaymentForm()" class="btn-secondary">Отмена</button>
    </div>
</div>

<script>
    // ... (твой JavaScript остаётся без изменений)
    let currentCost = 0;

    function updatePrice() {
        const from = document.getElementById('fromBranch').value;
        const to = document.getElementById('toBranch').value;
        const weight = parseFloat(document.getElementById('weight').value) || 0;

        if (weight > 0) {
            fetch(`/api/calculate-price?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&weight=${weight}`)
                .then(r => r.json())
                .then(data => {
                    currentCost = data.cost;
                    document.getElementById('priceDisplay').textContent = currentCost.toFixed(2);
                });
        }
    }

    document.getElementById('fromBranch').addEventListener('change', updatePrice);
    document.getElementById('toBranch').addEventListener('change', updatePrice);
    document.getElementById('weight').addEventListener('input', updatePrice);

    function formatExpiry(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 2) {
            value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        input.value = value;
    }

    function showPaymentForm() {
        if (currentCost <= 0) {
            alert("Сначала выберите отделения и вес!");
            return;
        }
        document.getElementById('finalPrice').textContent = currentCost.toFixed(2);
        document.getElementById('paymentForm').style.display = 'block';
        document.getElementById('cardError').textContent = '';
        document.getElementById('expiryError').textContent = '';
        document.getElementById('cvvError').textContent = '';
    }

    function hidePaymentForm() {
        document.getElementById('paymentForm').style.display = 'none';
    }

    function processPayment() {
        const cardNumber = document.getElementById('cardNumber').value.trim();
        const expiry = document.getElementById('expiry').value.trim();
        const cvv = document.getElementById('cvv').value.trim();

        let hasError = false;

        if (!/^\d{16}$/.test(cardNumber)) {
            document.getElementById('cardError').textContent = "Номер карты должен содержать ровно 16 цифр";
            hasError = true;
        } else {
            document.getElementById('cardError').textContent = '';
        }

        if (!/^\d{2}\/\d{2}$/.test(expiry)) {
            document.getElementById('expiryError').textContent = "Срок действия должен быть в формате MM/YY (например: 12/28)";
            hasError = true;
        } else {
            const [month, year] = expiry.split('/').map(Number);
            if (month < 1 || month > 12) {
                document.getElementById('expiryError').textContent = "Месяц должен быть от 01 до 12";
                hasError = true;
            } else {
                document.getElementById('expiryError').textContent = '';
            }
        }

        if (!/^\d{3}$/.test(cvv)) {
            document.getElementById('cvvError').textContent = "CVV должен содержать ровно 3 цифры";
            hasError = true;
        } else {
            document.getElementById('cvvError').textContent = '';
        }

        if (hasError) return;

        alert(`✅ Оплата на сумму ${currentCost.toFixed(2)} грн прошла успешно!`);

        const formData = new FormData();
        formData.append("fromBranch", document.getElementById('fromBranch').value);
        formData.append("toBranch", document.getElementById('toBranch').value);
        formData.append("weight", document.getElementById('weight').value);

        fetch('/create', { method: 'POST', body: formData })
            .then(() => window.location.href = '/history');
    }

    window.onload = updatePrice;
</script>
</body>
</html>
