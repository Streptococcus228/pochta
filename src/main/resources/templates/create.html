<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Створити посилку — Пошта</title>
    <style>
        :root {
            --primary: #0052cc;
            --primary-hover: #0047b3;
            --success: #36b37e;
            --success-hover: #2d9669;
            --bg: #f4f5f7;
            --text: #172b4d;
            --text-muted: #6b778c;
            --border: #dfe1e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.8);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 32px;
            font-size: 28px;
            font-weight: 700;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        select, input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .price-box {
            background: #f0f5ff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            border: 2px dashed var(--primary);
        }

        .price-label { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
        .price-value { font-size: 32px; font-weight: 800; color: var(--primary); }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: var(--success-hover); }

        .btn-secondary { background: #ebecf0; color: var(--text); }
        .btn-secondary:hover { background: #dfe1e6; }

        .payment-form {
            display: none;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 2px solid var(--bg);
        }

        .payment-form h2 { font-size: 20px; margin-bottom: 20px; }

        .error { color: #de350b; font-size: 13px; margin-top: -16px; margin-bottom: 16px; font-weight: 500; }
    </style>
</head>
<body>
<div class="container">
    <h1>Нова посилка</h1>

    <form id="parcelForm">
        <label>Пункт відправлення</label>
        <select id="fromBranch">
            <option th:each="branch : ${branches}" th:value="${branch.name}" th:text="${branch.name}"></option>
        </select>

        <label>Пункт призначення</label>
        <select id="toBranch">
            <option th:each="branch : ${branches}" th:value="${branch.name}" th:text="${branch.name}"></option>
        </select>

        <label>Вага посилки (кг)</label>
        <input type="number" id="weight" step="0.1" min="0.1" value="2.5">

        <div class="price-box">
            <div class="price-label">Вартість доставки</div>
            <div class="price-value"><span id="priceDisplay">0.00</span> грн</div>
        </div>

        <button type="button" onclick="showPaymentForm()" class="btn btn-primary">
            Оформити та оплатити
        </button>
    </form>

    <a href="/history" class="btn btn-secondary">Мої посилки</a>

    <!-- Форма оплати -->
    <div class="payment-form" id="paymentForm">
        <h2>Оплата карткою</h2>
        
        <label>Номер картки</label>
        <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="16">
        <div id="cardError" class="error"></div>

        <div style="display: flex; gap: 16px;">
            <div style="flex: 1;">
                <label>Термін дії</label>
                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
                <div id="expiryError" class="error"></div>
            </div>
            <div style="flex: 1;">
                <label>CVV</label>
                <input type="password" id="cvv" placeholder="***" maxlength="3">
                <div id="cvvError" class="error"></div>
            </div>
        </div>

        <button onclick="processPayment()" class="btn btn-success">Підтвердити оплату <span id="finalPrice">0.00</span> грн</button>
        <button onclick="hidePaymentForm()" class="btn btn-secondary">Скасувати</button>
    </div>
</div>

<script>
    let currentCost = 0;

    function updatePrice() {
        const from = document.getElementById('fromBranch').value;
        const to = document.getElementById('toBranch').value;
        const weight = parseFloat(document.getElementById('weight').value) || 0;

        if (weight > 0) {
            fetch(`/api/calculate-price?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&weight=${weight}`)
                .then(r => r.json())
                .then(data => {
                    currentCost = data.cost || 0;
                    document.getElementById('priceDisplay').textContent = currentCost.toFixed(2);
                })
                .catch(() => {
                    document.getElementById('priceDisplay').textContent = "0.00";
                });
        }
    }

    document.getElementById('fromBranch').addEventListener('change', updatePrice);
    document.getElementById('toBranch').addEventListener('change', updatePrice);
    document.getElementById('weight').addEventListener('input', updatePrice);

    function formatExpiry(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 2) {
            value = value.substring(0, 2) + '/' + value.substring(2, 4);
        }
        input.value = value;
    }

    function showPaymentForm() {
        if (currentCost <= 0) {
            alert("Спочатку виберіть відділення та вагу!");
            return;
        }
        document.getElementById('finalPrice').textContent = currentCost.toFixed(2);
        document.getElementById('paymentForm').style.display = 'block';
        document.getElementById('cardError').textContent = '';
        document.getElementById('expiryError').textContent = '';
        document.getElementById('cvvError').textContent = '';
    }

    function hidePaymentForm() {
        document.getElementById('paymentForm').style.display = 'none';
    }

    function processPayment() {
        const cardNumber = document.getElementById('cardNumber').value.trim();
        const expiry = document.getElementById('expiry').value.trim();
        const cvv = document.getElementById('cvv').value.trim();

        let hasError = false;

        if (!/^\d{16}$/.test(cardNumber)) {
            document.getElementById('cardError').textContent = "Номер картки має містити рівно 16 цифр";
            hasError = true;
        } else {
            document.getElementById('cardError').textContent = '';
        }

        if (!/^\d{2}\/\d{2}$/.test(expiry)) {
            document.getElementById('expiryError').textContent = "Термін дії має бути у форматі MM/YY (наприклад: 12/28)";
            hasError = true;
        } else {
            const [month, year] = expiry.split('/').map(Number);
            if (month < 1 || month > 12) {
                document.getElementById('expiryError').textContent = "Місяць має бути від 01 до 12";
                hasError = true;
            } else {
                document.getElementById('expiryError').textContent = '';
            }
        }

        if (!/^\d{3}$/.test(cvv)) {
            document.getElementById('cvvError').textContent = "CVV має містити рівно 3 цифри";
            hasError = true;
        } else {
            document.getElementById('cvvError').textContent = '';
        }

        if (hasError) return;

        alert(`Оплата на суму ${currentCost.toFixed(2)} грн пройшла успішно!`);

        const formData = new FormData();
        formData.append("fromBranch", document.getElementById('fromBranch').value);
        formData.append("toBranch", document.getElementById('toBranch').value);
        formData.append("weight", document.getElementById('weight').value);

        fetch('/create', { method: 'POST', body: formData })
            .then(() => window.location.href = '/history');
    }

    window.onload = updatePrice;
</script>
</body>
</html>
