<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — Почта</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f7f9;
            margin: 0;
            padding: 50px;
        }
        .box {
            max-width: 440px;
            margin: auto;
            background: white;
            padding: 45px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
        }
        h1 {
            color: #0066cc;
            margin-bottom: 30px;
            font-size: 28px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.15);
        }

        /* Красивая кнопка входа */
        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #0066cc, #0088ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16.5px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 102, 204, 0.4);
            background: linear-gradient(135deg, #0055aa, #0077ee);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }

        .error {
            color: #dc3545;
            margin: 15px 0;
            font-weight: 500;
        }
        .success {
            color: #28a745;
            margin: 15px 0;
            font-weight: 500;
        }

        p a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        p a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>🔑 Вход в систему Почта</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>
    <div th:if="${message}" class="success" th:text="${message}"></div>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Логин" required/>
        <input type="password" name="password" placeholder="Пароль" required/>

        <button type="submit" class="btn-primary">Войти</button>
    </form>

    <p style="margin-top:25px; color:#555;">
        Нет аккаунта?
        <a href="/register">Зарегистрироваться</a>
    </p>
</div>
</body>
</html>
