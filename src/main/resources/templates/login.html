<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід — Пошта</title>
    <style>
        :root {
            --primary: #0052cc;
            --primary-hover: #0047b3;
            --bg: #f4f5f7;
            --text: #172b4d;
            --text-muted: #6b778c;
            --error: #de350b;
            --success: #00875a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.8);
            z-index: -1;
            pointer-events: none;
        }

        .box {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin: 20px;
        }

        h1 {
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 24px 0;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 2px solid #dfe1e6;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .error { color: var(--error); margin-bottom: 16px; font-weight: 500; }
        .success { color: var(--success); margin-bottom: 16px; font-weight: 500; }

        p { color: rgba(255,255,255,0.8); margin-top: 24px; }
        p a { color: white; text-decoration: none; font-weight: 600; text-decoration: underline; }
        p a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <h1>Вхід до системи</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>
    <div th:if="${message}" class="success" th:text="${message}"></div>

    <form action="/login" method="post">
        <input type="text" name="username" placeholder="Логін" required/>
        <input type="password" name="password" placeholder="Пароль" required/>

        <button type="submit" class="btn-primary">Увійти</button>
    </form>

    <p>
        Немає акаунту?
        <a href="/register">Зареєструватися</a>
    </p>
</div>
</body>
</html>
