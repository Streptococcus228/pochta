<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мої відправлення — Пошта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            --primary: #0052cc;
            --primary-hover: #0047b3;
            --bg: #f4f5f7;
            --text: #172b4d;
            --text-muted: #6b778c;
            --border: #dfe1e6;
            --success-bg: #e3fcef;
            --success-text: #006644;
            --info-bg: #deebff;
            --info-text: #0747a6;
            --warning-bg: #fffae6;
            --warning-text: #826a00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.8);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 32px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; color: var(--text); }

        .btn-create {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-create:hover { background-color: var(--primary-hover); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 20px; }
        th { text-align: left; padding: 16px; color: rgba(255,255,255,0.7); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 16px; background: rgba(255,255,255,0.95); color: var(--text); }
        tr td:first-child { border-radius: 12px 0 0 12px; }
        tr td:last-child { border-radius: 0 12px 12px 0; }
        tr:hover { transform: translateY(-2px); cursor: pointer; transition: transform 0.2s; }

        .status {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }
        .DELIVERED { background: var(--success-bg); color: var(--success-text); }
        .IN_TRANSIT { background: var(--info-bg); color: var(--info-text); }
        .CREATED { background: var(--warning-bg); color: var(--warning-text); }

        .progress-container { width: 120px; background: #edeff2; border-radius: 10px; height: 8px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
        .progress-text { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 600; }

        /* Modal & Map styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(9, 30, 66, 0.54); z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content {
            background: white;
            margin: 40px auto;
            width: 90%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            position: relative;
        }
        #map { height: 400px; width: 100%; }

        .timeline-section { padding: 32px; background: #fff; }
        .timeline-item { display: flex; gap: 20px; margin-bottom: 20px; position: relative; }
        .timeline-item:not(:last-child)::after {
            content: ''; position: absolute; left: 10px; top: 24px; bottom: -20px; width: 2px; background: var(--border);
        }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: #dfe1e6; z-index: 1; border: 4px solid #fff; box-shadow: 0 0 0 2px #dfe1e6; }
        .dot.active { background: var(--success-text); box-shadow: 0 0 0 2px var(--success-text); }

        .close-modal {
            width: 32px;
            height: 32px;
            background: #f4f5f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .close-modal:hover {
            background: #ebecf0;
            color: var(--text);
            transform: scale(1.1);
        }

        .modal-header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 style="color: white;">Мої відправлення</h1>
        <div style="display:flex; gap:12px; align-items:center;">
            <a href="/" style="color: white; text-decoration: none; font-weight: 600; border: 1px solid rgba(255,255,255,0.3); padding: 4px 12px; border-radius: 6px;">На головну</a>
            <a href="/create" class="btn-create">Нова посилка</a>
        </div>
    </div>

    <table id="historyTable">
        <thead>
        <tr>
            <th>ID посилки</th>
            <th>Маршрут</th>
            <th>Вага</th>
            <th>Вартість</th>
            <th>Статус</th>
            <th>Прогрес</th>
            <th>Дата створення</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

        <div id="mapModal" class="modal" onclick="if(event.target === this) closeMap()">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalParcelNumber" style="margin:0;"></h3>
            <span class="close-modal" onclick="closeMap()">✕</span>
        </div>
        <div id="map"></div>
        <div class="timeline-section">
            <div id="timelineContainer"></div>
            <div style="margin-top: 24px; text-align: right;">
                <!-- Кнопка "Закрити" видалена за запитом користувача -->
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script th:inline="javascript">
    let currentMap = null;
    let currentCarMarker = null;
    let currentRouteControl = null;
    let currentParcelId = null;
    let routePoints = [];
    let parcelCreatedAt = null;

    function getKyivTime(date) {
        return new Date(date).toLocaleTimeString('uk-UA', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    async function loadHistory() {
        try {
            const res = await fetch('/api/history', {cache: 'no-cache'});
            const parcels = await res.json();

            let html = '';
            parcels.forEach(p => {
                const canDelete = ['DELIVERED','FAILED'].includes(p.status);
                const createdDate = new Date(p.createdAt);
                const formattedCreated = createdDate.toLocaleString('uk-UA', {
                    day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
                });

                const statusTranslations = {
                    'CREATED': 'СТВОРЕНО',
                    'QUEUED': 'В ЧЕРЗІ',
                    'PAID': 'ОПЛАЧЕНО',
                    'IN_TRANSIT': 'В ДОРОЗІ',
                    'DELIVERED': 'ДОСТАВЛЕНО',
                    'FAILED': 'ПОМИЛКА'
                };
                const translatedStatus = statusTranslations[p.status] || p.status;

                html += `<tr onclick="showMap('${p.parcelNumber}', '${p.fromBranch}', '${p.toBranch}', ${p.progress}, '${p.id}', '${p.createdAt}')">
                    <td><strong>${p.parcelNumber}</strong></td>
                    <td>${p.fromBranch} → ${p.toBranch}</td>
                    <td>${p.weight} кг</td>
                    <td><strong>${p.cost.toFixed(2)}</strong> грн</td>
                    <td><span class="status ${p.status}">${translatedStatus}</span></td>
                    <td>
                        <div class="progress-container"><div class="progress-fill" style="width:${p.progress}%"></div></div>
                        <div class="progress-text">${p.progress}%</div>
                    </td>
                    <td>${formattedCreated}</td>
                    <td>${canDelete ? `<span onclick="event.stopImmediatePropagation();deleteParcel(${p.id});" style="color:#e74c3c;font-size:16px;font-weight:bold;cursor:pointer;">Видалити</span>` : ''}</td>
                </tr>`;
            });

            document.getElementById('tableBody').innerHTML = html || `<tr><td colspan="10" style="padding:80px;color:#777;text-align:center;">Поки немає відправлень</td></tr>`;

            if (currentMap && currentParcelId) {
                const parcel = parcels.find(p => String(p.id) === String(currentParcelId));
                if (parcel) updateCarPosition(parcel.progress);
            }
        } catch(e) { console.error(e); }
    }

    function showMap(parcelNumber, from, to, progress, parcelId, createdAtStr) {
        currentParcelId = parcelId;
        parcelCreatedAt = new Date(createdAtStr);

        document.getElementById('mapModal').style.display = 'block';
        document.getElementById('modalParcelNumber').textContent = parcelNumber;

        if (currentMap) currentMap.remove();

        currentMap = L.map('map').setView([48.8, 31.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(currentMap);

        const coords = {};
        /*[# th:if="${branches != null}"]*/
        /*[# th:each="b : ${branches}"]*/
        coords[ [[${b.name}]] ] = [ [[${b.latitude}]], [[${b.longitude}]] ];
        /*[/]*/
        /*[/]*/

        const start = L.latLng(coords[from] || [46.48, 30.72]);
        const end   = L.latLng(coords[to]   || [50.45, 30.52]);

        currentRouteControl = L.Routing.control({
            waypoints: [start, end],
            routeWhileDragging: false,
            addWaypoints: false,
            draggableWaypoints: false,
            show: false,
            lineOptions: { styles: [{color: '#0066cc', weight: 7, opacity: 0.85}] }
        }).addTo(currentMap);

        currentRouteControl.on('routesfound', function(e) {
            routePoints = e.routes[0].coordinates;
            updateCarPosition(progress);
        });

        // Большая машинка
        currentCarMarker = L.marker(start, {
            icon: L.divIcon({
                className: 'car-marker',
                html: '<div style="background:var(--primary); width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow:0 0 8px rgba(0,0,0,0.3);"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            })
        }).addTo(currentMap);

        generateTimeline(progress);
    }

    function updateCarPosition(progress) {
        if (!currentCarMarker || !routePoints || routePoints.length === 0) return;
        const index = Math.floor((progress / 100) * (routePoints.length - 1));
        const point = routePoints[Math.min(index, routePoints.length - 1)];
        currentCarMarker.setLatLng([point.lat, point.lng]);
    }

    function generateTimeline(currentProgress) {
        const container = document.getElementById('timelineContainer');
        if (!parcelCreatedAt) return;

        const steps = [
            { name: "Посилку створено",       time: getKyivTime(parcelCreatedAt),  completed: true },
            { name: "Оплату підтверджено",   time: getKyivTime(new Date(parcelCreatedAt.getTime() + 12000)), completed: true },
            { name: "Відправлено в дорогу",     time: getKyivTime(new Date(parcelCreatedAt.getTime() + 25000)), completed: currentProgress > 5 },
            { name: "Доставлено",            time: currentProgress === 100 ? getKyivTime(new Date(parcelCreatedAt.getTime() + 42000)) : "Очікується", completed: currentProgress === 100 }
        ];

        let html = '';
        steps.forEach(step => {
            html += `
                <div class="timeline-item">
                    <div class="dot ${step.completed ? 'active' : ''}"></div>
                    <div class="timeline-content">
                        <div style="font-weight:700; font-size:14px;">${step.name}</div>
                        <div style="font-size:12px; color:var(--text-muted);">${step.time}</div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function closeMap() {
        document.getElementById('mapModal').style.display = 'none';
        currentParcelId = null;
        parcelCreatedAt = null;
        if (currentMap) currentMap.remove();
        currentMap = null;
        currentCarMarker = null;
        currentRouteControl = null;
        routePoints = [];
    }

    function deleteParcel(id) {
        if (confirm('Видалити посилку з історії?')) {
            fetch('/parcels/delete/' + id, {method: 'POST'}).then(() => loadHistory());
        }
    }

    setInterval(loadHistory, 2500);
    loadHistory();
</script>
</body>
</html>
