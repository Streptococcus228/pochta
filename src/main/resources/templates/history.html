<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои отправления — Почта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 6px 30px rgba(0,0,0,0.12); }
        h1 { color: #0066cc; text-align: center; margin-bottom: 20px; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .create-btn {
            padding: 14px 28px; background: #0066cc; color: white; text-decoration: none;
            border-radius: 50px; font-weight: 600;
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: linear-gradient(135deg, #0066cc, #0088ff); color: white; }
        tr:hover { background: #f0f8ff; cursor: pointer; }

        .status { padding: 8px 16px; border-radius: 25px; font-weight: 600; font-size: 14px; }
        .DELIVERED { background: #d4edda; color: #155724; }
        .IN_TRANSIT { background: #d1ecf1; color: #0c5460; }
        .CREATED { background: #fff3cd; color: #856404; }

        .progress-bar-container { width: 100%; background: #eee; border-radius: 9999px; height: 26px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #0066cc, #00bbff); color: white; text-align: center; line-height: 26px; font-size: 13px; font-weight: 600; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content {
            background: white;
            margin: 30px auto;
            width: 94%;
            max-width: 1050px;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #map { height: 390px; flex-shrink: 0; }

        .timeline {
            padding: 25px 35px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
        }
        .timeline-title { font-size: 18px; font-weight: 600; margin-bottom: 18px; color: #333; }
        .timeline-item { display: flex; margin-bottom: 16px; align-items: flex-start; }
        .timeline-dot {
            width: 22px; height: 22px; border-radius: 50%; margin-right: 18px; flex-shrink: 0;
            border: 3px solid white; box-shadow: 0 0 0 3px #0066cc;
        }
        .completed .timeline-dot { background: #28a745; box-shadow: 0 0 0 3px #28a745; }
        .timeline-content { flex: 1; }
        .timeline-status { font-weight: 600; font-size: 15px; }
        .timeline-time { font-size: 13.5px; color: #555; margin-top: 3px; }

        .close {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 38px;
            color: #444;
            cursor: pointer;
            z-index: 10;
        }

        /* Большая и заметная машинка */
        .car-marker {
            font-size: 62px !important;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.6);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>📬 Мои отправления</h1>
        <a href="/create" class="create-btn">+ Создать новую посылку</a>
    </div>

    <table id="historyTable">
        <thead>
        <tr>
            <th>ID посылки</th>
            <th>Откуда</th>
            <th>Куда</th>
            <th>Вес</th>
            <th>Стоимость</th>
            <th>Статус</th>
            <th>Машина</th>
            <th>Прогресс</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="mapModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeMap()">×</span>
        <h2 style="text-align:center; margin:15px 0 10px;">Отслеживание посылки <span id="modalParcelNumber"></span></h2>
        <div id="map"></div>

        <div class="timeline">
            <div class="timeline-title">История статусов посылки</div>
            <div id="timelineContainer"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script>
    let currentMap = null;
    let currentCarMarker = null;
    let currentRouteControl = null;
    let currentParcelId = null;
    let routePoints = [];
    let parcelCreatedAt = null;

    function getKyivTime(date) {
        const kyivDate = new Date(new Date(date).getTime() + 4*60*60*1000);
        return kyivDate.toLocaleTimeString('ru-RU', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    async function loadHistory() {
        try {
            const res = await fetch('/api/history', {cache: 'no-cache'});
            const parcels = await res.json();

            let html = '';
            parcels.forEach(p => {
                const canDelete = ['DELIVERED','FAILED'].includes(p.status);
                const createdDate = new Date(p.createdAt);
                const formattedCreated = createdDate.toLocaleString('ru-RU', {
                    day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
                });

                html += `<tr onclick="showMap('${p.parcelNumber}', '${p.fromBranch}', '${p.toBranch}', ${p.progress}, '${p.id}', '${p.createdAt}')">
                    <td><strong>${p.parcelNumber}</strong></td>
                    <td>${p.fromBranch}</td>
                    <td>${p.toBranch}</td>
                    <td>${p.weight} кг</td>
                    <td class="cost">${p.cost.toFixed(2)} грн</td>
                    <td><span class="status ${p.status}">${p.status}</span></td>
                    <td>${p.vehicleId ? `<span style="background:#e3f2fd;padding:5px 12px;border-radius:20px;">${p.vehicleId}</span>` : '—'}</td>
                    <td><div class="progress-bar-container"><div class="progress-bar" style="width:${p.progress}%">${p.progress}%</div></div></td>
                    <td>${formattedCreated}</td>
                    <td>${canDelete ? `<span onclick="event.stopImmediatePropagation();deleteParcel(${p.id});" style="color:#e74c3c;font-size:22px;cursor:pointer;">🗑</span>` : ''}</td>
                </tr>`;
            });

            document.getElementById('tableBody').innerHTML = html || `<tr><td colspan="10" style="padding:80px;color:#777;text-align:center;">Пока нет отправлений</td></tr>`;

            if (currentMap && currentParcelId) {
                const parcel = parcels.find(p => String(p.id) === String(currentParcelId));
                if (parcel) updateCarPosition(parcel.progress);
            }
        } catch(e) { console.error(e); }
    }

    function showMap(parcelNumber, from, to, progress, parcelId, createdAtStr) {
        currentParcelId = parcelId;
        parcelCreatedAt = new Date(createdAtStr);

        document.getElementById('mapModal').style.display = 'block';
        document.getElementById('modalParcelNumber').textContent = parcelNumber;

        if (currentMap) currentMap.remove();

        currentMap = L.map('map').setView([48.8, 31.5], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(currentMap);

        const coords = {
            "Одесса-Центр": [46.4825, 30.7233],
            "Киев-Главпочтамт": [50.4501, 30.5234],
            "Львов-1": [49.8397, 24.0297],
            "Харьков-Север": [49.9808, 36.2527],
            "Днепр-Юг": [48.4647, 35.0462]
        };

        const start = L.latLng(coords[from] || [46.48, 30.72]);
        const end   = L.latLng(coords[to]   || [50.45, 30.52]);

        currentRouteControl = L.Routing.control({
            waypoints: [start, end],
            routeWhileDragging: false,
            addWaypoints: false,
            draggableWaypoints: false,
            show: false,
            lineOptions: { styles: [{color: '#0066cc', weight: 7, opacity: 0.85}] }
        }).addTo(currentMap);

        currentRouteControl.on('routesfound', function(e) {
            routePoints = e.routes[0].coordinates;
            updateCarPosition(progress);
        });

        // Большая машинка
        currentCarMarker = L.marker(start, {
            icon: L.divIcon({
                className: 'car-marker',
                html: '🚛',
                iconSize: [62, 62]
            })
        }).addTo(currentMap);

        generateTimeline(progress);
    }

    function updateCarPosition(progress) {
        if (!currentCarMarker || !routePoints || routePoints.length === 0) return;
        const index = Math.floor((progress / 100) * (routePoints.length - 1));
        const point = routePoints[Math.min(index, routePoints.length - 1)];
        currentCarMarker.setLatLng([point.lat, point.lng]);
    }

    function generateTimeline(currentProgress) {
        const container = document.getElementById('timelineContainer');

        if (!parcelCreatedAt) return;

        const createdTime  = getKyivTime(parcelCreatedAt);
        const paidTime     = getKyivTime(new Date(parcelCreatedAt.getTime() + 12000));
        const transitTime  = getKyivTime(new Date(parcelCreatedAt.getTime() + 25000));
        const deliveredTime = currentProgress === 100
            ? getKyivTime(new Date(parcelCreatedAt.getTime() + 42000))
            : "Ожидается";

        const steps = [
            { name: "Посылка создана",       time: createdTime,  completed: true },
            { name: "Оплата подтверждена",   time: paidTime,     completed: true },
            { name: "Отправлена в путь",     time: transitTime,  completed: currentProgress > 5 },
            { name: "Доставлена",            time: deliveredTime, completed: currentProgress === 100 }
        ];

        let html = '';
        steps.forEach(step => {
            html += `
                <div class="timeline-item ${step.completed ? 'completed' : ''}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-status">${step.name}</div>
                        <div class="timeline-time">${step.time}</div>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    function closeMap() {
        document.getElementById('mapModal').style.display = 'none';
        currentParcelId = null;
        parcelCreatedAt = null;
        if (currentMap) currentMap.remove();
        currentMap = null;
        currentCarMarker = null;
        currentRouteControl = null;
        routePoints = [];
    }

    function deleteParcel(id) {
        if (confirm('Удалить посылку из истории?')) {
            fetch('/parcels/delete/' + id, {method: 'POST'}).then(() => loadHistory());
        }
    }

    setInterval(loadHistory, 2500);
    loadHistory();
</script>
</body>
</html>
